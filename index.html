<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Booth Scanner</title>
    <!-- Load the HTML5-QRCode Library via CDN -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        select {
            font-size: 18px;
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
        }
        #feedback {
            margin-top: 20px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            display: none; /* Hidden by default */
        }
        .success { background-color: #d4edda; color: #155724; display: block !important; }
        .error { background-color: #f8d7da; color: #721c24; display: block !important; }
        .processing { background-color: #fff3cd; color: #856404; display: block !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Booth Scanner</h2>
        
        <!-- Booth Selection Dropdown -->
        <select id="booth-select">
            <option value="Booth A">Booth A</option>
            <option value="Booth B">Booth B</option>
            <option value="Booth C">Booth C</option>
        </select>

        <!-- Camera Container -->
        <div id="reader"></div>

        <!-- Feedback Message Area -->
        <div id="feedback">Ready to scan</div>
    </div>

    <script>
        // 1. IMPORTANT: Replace this with your Make.com or Zapier Webhook URL
        const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyciGHsj4VcWzAu3lFcJP_4Jhg7vdDP6U_yztAT7_MW_TEjryJOwMq8TDTq2Oq2P6Ykew/exec";
        
        let isProcessing = false; // Prevents double-scanning the same code instantly
        const feedbackEl = document.getElementById('feedback');

        // Initialize the QR Scanner
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: { width: 250, height: 250 } },
            /* verbose= */ false
        );

        // Function that runs when a QR code is successfully read
        async function onScanSuccess(decodedText, decodedResult) {
            // Stop if we are already processing a code
            if (isProcessing) return;
            isProcessing = true;

            // Pause the scanner to prevent multiple scans
            html5QrcodeScanner.pause(true);

            // Get the selected booth
            const selectedBooth = document.getElementById('booth-select').value;

            // Show processing state
            feedbackEl.className = 'processing';
            feedbackEl.innerText = '⏳ Verifying ' + decodedText + '...';

            try {
                // Send data to your automation tool
                const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                body: JSON.stringify({
                uid: decodedText,
                booth: selectedBooth
                })
            });

                // Read the response from Make/Zapier
                const result = await response.json();

                // Check the logic returned from your automation
                // Your automation must return JSON like {"status": "success"} or {"status": "error"}
                if (result.status === 'success') {
                    feedbackEl.className = 'success';
                    feedbackEl.innerText = '✅ Valid! Deducted from ' + selectedBooth;
                } else {
                    feedbackEl.className = 'error';
                    feedbackEl.innerText = '❌ STOP: ' + (result.message || 'Already voided or invalid code');
                }
            } catch (error) {
                feedbackEl.className = 'error';
                feedbackEl.innerText = '⚠️ Network Error. Check internet connection.';
            }

            // Wait 3 seconds, then clear the screen and resume scanning
            setTimeout(() => {
                feedbackEl.className = '';
                feedbackEl.style.display = 'none';
                isProcessing = false;
                html5QrcodeScanner.resume();
            }, 3000);
        }

        function onScanFailure(error) {
            // HTML5-QRcode throws errors constantly when it doesn't see a code. 
            // We leave this empty so it doesn't spam the console.
        }

        // Start the scanner
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
